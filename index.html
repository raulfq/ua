<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario TI - Responsive Dark</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
            --fondo-oscuro: #202b38;
            --fondo-paneles: #2d3748;
        }

        body { 
            max-width: 100% !important; 
            width: 100% !important;
            padding: 20px; 
            margin: 0 auto;
            background-color: var(--fondo-oscuro);
            box-sizing: border-box;
            font-size: 16px; /* Previene zoom en iOS */
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 { text-align: center; color: var(--azul-institucional); margin-bottom: 25px; }

        /* Pestañas */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn { 
            flex: 1;
            max-width: 300px;
            text-align: center;
            cursor: pointer; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: var(--fondo-paneles); 
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn.active { 
            background: var(--azul-institucional); 
            border-color: var(--azul-institucional); 
            box-shadow: 0 4px 15px rgba(74, 134, 232, 0.3);
        }

        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* FORMULARIO RESPONSIVE */
        #formInventario {
            max-width: 800px; /* Un poco más ancho para aprovechar el escritorio */
            margin: 0 auto;
            background: var(--fondo-paneles);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* La magia del Grid: 1 columna por defecto (Móvil) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        /* Excepción para escritorio: 2 columnas */
        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: span 2; /* Notas y botón ocupan todo el ancho */
            }
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; color: #a0aec0; font-size: 0.9rem; }
        
        input, select, textarea {
            background: #1a202c !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 12px !important;
            border-radius: 5px;
            width: 100% !important;
            box-sizing: border-box;
        }

        #btnEnviar {
            background-color: var(--azul-institucional);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* TABLA Y CONTENEDOR */
.header-tabla {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
}

.tabla-container {
    width: 100%;
    overflow-x: auto; /* ✅ SCROLL LATERAL */
    background: var(--fondo-paneles);
    border-radius: 10px;
    padding: 15px;
    box-sizing: border-box;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

table.dataTable { 
    width: 100% !important; 
    margin: 0 !important; 
}

/* 🔥 HEADER MEJORADO */
table.dataTable thead th { 
    background-color: var(--azul-institucional) !important; 
    padding: 14px 18px !important;
    border-bottom: none !important; 
    color: white !important; 
    
    white-space: nowrap;          /* 🔥 todo en una sola línea */
    min-width: 150px;             /* 🔥 fuerza espacio */
    text-align: left;
}

/* 🔥 CELDAS */
table.dataTable tbody td { 
    padding: 14px 18px !important;
    border-bottom: 1px solid #3e4b5b !important; 
    white-space: nowrap; /* 👈 datos en una sola línea */
    min-width: 130px;
}

/* FILAS */
table.dataTable tbody tr {
    border-bottom: 1px solid #4a5568;
}

table.dataTable tbody tr:hover {
    background-color: #374151;
}

/* 🔥 AJUSTE CLAVE PARA CELULAR */
@media (max-width: 600px) {

    table.dataTable thead th {
        font-size: 0.85rem;
        padding: 12px 14px !important;
    }

    table.dataTable tbody td {
        font-size: 0.85rem;
        padding: 12px 14px !important;
    }

    /* 👇 fuerza mejor separación horizontal */
    table.dataTable thead th,
    table.dataTable tbody td {
        min-width: 120px;
    }
}
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Inventario TI</h1>

        <div class="tabs">
            <div class="tab-btn active" onclick="openTab('registro')">📝 REGISTRO</div>
            <div class="tab-btn" onclick="openTab('consulta')">📊 LISTADO</div>
        </div>

        <div id="registro" class="tab-content active">
            <form id="formInventario">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre de Equipo</label>
                        <input type="text" name="pc_nombre" placeholder="Ej: PC-VENTAS-01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Número de Serie</label>
                        <input type="text" name="serie" placeholder="S/N: XXXXXXXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Ubicación</label>
                        <select name="piso" required>
                            <option value="" disabled selected>Seleccione el piso...</option>
                            <option value="Piso 1">Piso 1</option>
                            <option value="Piso 2">Piso 2</option>
                            <option value="Piso 3">Piso 3</option>
                            <option value="Piso 3">Piso 4</option>
                            <option value="Piso 3">Piso 5</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Área</label>
                        <input type="text" name="area" placeholder="Ej: Recursos Humanos" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Usuario Responsable</label>
                        <input type="text" name="usuario" placeholder="Nombre del trabajador" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Notas Técnicas</label>
                        <textarea name="notas" rows="3" placeholder="RAM, Procesador, estado..."></textarea>
                    </div>
                </div>
                
                <button type="submit" id="btnEnviar" class="full-width">💾 GUARDAR REGISTRO</button>
            </form>
        </div>

     <div id="consulta" class="tab-content">
    <div class="header-tabla">
        <h3 style="margin: 0; color: white;">Equipos Registrados</h3>
        <button onclick="cargarDatos()" style="background: #2ecc71; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold;">
            🔄 ACTUALIZAR
        </button>
    </div>
    
    <div id="loader" class="loading" style="display:none;">
        ⏳ Sincronizando datos...
    </div>
    
    <div class="tabla-container">
        <!-- 🔥 SIN nowrap -->
        <table id="tablaInventario" class="display">
            <thead>
                <tr>
                    <th>ID ACTIVO</th>
                    <th>NOMBRE PC</th>
                    <th>SERIE</th>
                    <th>PISO</th>
                    <th>ÁREA</th>
                    <th>USUARIO</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

        function openTab(tabId) {
            $('.tab-content').removeClass('active');
            $('.tab-btn').removeClass('active');
            $(`#${tabId}`).addClass('active');
            $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
            if(tabId === 'consulta') cargarDatos();
        }

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO DATOS...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("✅ Éxito: El equipo ha sido registrado.");
                this.reset();
                btn.disabled = false;
                btn.innerText = "💾 GUARDAR REGISTRO";
            }).catch(err => {
                console.error(err);
                alert("❌ Error al guardar.");
                btn.disabled = false;
            });
        });

        let dataTable;
        async function cargarDatos() {
            $('#loader').show();
            try {
                const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
                const data = await response.json();
                
                if (dataTable) dataTable.destroy();
                
                const html = data.map(reg => `
                    <tr>
                        <td><span style="color: #4a86e8; font-weight: bold;">${reg.id_activo || '-'}</span></td>
                        <td>${reg.nombre_de_pc || '-'}</td>
                        <td>${reg.serie || '-'}</td>
                        <td>${reg.piso || '-'}</td>
                        <td>${reg.area || '-'}</td>
                        <td>${reg.usuario || '-'}</td>
                    </tr>
                `).join('');
                
                document.getElementById('cuerpoTabla').innerHTML = html;
                
                dataTable = $('#tablaInventario').DataTable({
                    scrollX: true, /* SCROLL LATERAL MANTENIDO */
                    language: { 
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
                    },
                    pageLength: 10,
                    dom: 'ftp'
                });
            } catch (error) {
                console.error(error);
            } finally {
                $('#loader').hide();
            }
        }
    </script>
</body>
</html>
