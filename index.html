<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario TI - Web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css"> </head>
<body>
    <h1>Registro de Activos TI</h1>
    <form id="formInventario">
        <input type="text" name="pc_nombre" placeholder="Nombre de PC" required>
        <input type="text" name="serie" placeholder="Número de Serie" required>
        <select name="piso">
            <option value="1">Piso 1</option>
            <option value="2">Piso 2</option>
        </select>
        <input type="text" name="area" placeholder="Área" required>
        <input type="text" name="usuario" placeholder="Usuario Responsable" required>
        <textarea name="notas" placeholder="Notas adicionales"></textarea>
        <button type="submit">Enviar a Inventario</button>
    </form>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec";

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors', // Importante para evitar errores de seguridad simples
                body: JSON.stringify(data)
            }).then(() => {
                alert("¡Datos enviados con éxito!");
                this.reset();
            }).catch(err => console.error("Error:", err));
        });
    </script>
</body>
</html>
