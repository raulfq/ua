<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario TI</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
            --fondo-oscuro: #202b38;
            --fondo-paneles: #2d3748;
        }

        body { 
            max-width: 100% !important; 
            width: 100% !important;
            padding: 20px; 
            margin: 0 auto;
            background-color: var(--fondo-oscuro);
            box-sizing: border-box;
            font-size: 16px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 { text-align: center; color: var(--azul-institucional); margin-bottom: 25px; }

        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn { 
            flex: 1;
            max-width: 300px;
            text-align: center;
            cursor: pointer; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: var(--fondo-paneles); 
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn.active { 
            background: var(--azul-institucional); 
            border-color: var(--azul-institucional); 
            box-shadow: 0 4px 15px rgba(74, 134, 232, 0.3);
        }

        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #formInventario {
            max-width: 800px;
            margin: 0 auto;
            background: var(--fondo-paneles);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; color: #a0aec0; font-size: 0.9rem; }
        
        input, select, textarea {
            background: #1a202c !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 12px !important;
            border-radius: 5px;
            width: 100% !important;
            box-sizing: border-box;
        }

        #btnEnviar {
            background-color: var(--azul-institucional);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .header-tabla {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        #tablaInventario {
            min-width: 900px;
        }

        .tabla-container {
            width: 100%;
            overflow-x: auto;
            background: var(--fondo-paneles);
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        table.dataTable { 
            width: 100% !important; 
            margin: 0 !important; 
        }

        table.dataTable thead th { 
            background-color: var(--azul-institucional) !important; 
            padding: 14px 18px !important;
            border-bottom: none !important; 
            color: white !important; 
            white-space: nowrap;
            min-width: 150px;
            text-align: left;
        }

        table.dataTable tbody td { 
            padding: 14px 18px !important;
            border-bottom: 1px solid #3e4b5b !important; 
            white-space: nowrap;
            min-width: 130px;
        }

        td:nth-child(5),
        td:nth-child(6) {
            white-space: normal !important;
            word-break: break-word;
            max-width: 220px;
        }

        table.dataTable tbody tr {
            border-bottom: 1px solid #4a5568;
        }

        table.dataTable tbody tr:hover {
            background-color: #374151;
        }

        @media (max-width: 600px) {
            table.dataTable thead th {
                font-size: 0.85rem;
                padding: 12px 14px !important;
            }
            table.dataTable tbody td {
                font-size: 0.85rem;
                padding: 12px 14px !important;
            }
            table.dataTable thead th,
            table.dataTable tbody td {
                min-width: 120px;
            }
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── MODAL FIXES ── */
        #modalEditar input,
        #modalEditar select,
        #modalEditar textarea {
            margin-bottom: 10px;
            display: block;
        }

        #modalEditar button {
            margin-right: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Inventario TI</h1>

    <div class="tabs">
        <div class="tab-btn active" onclick="openTab('registro')">📝 REGISTRO</div>
        <div class="tab-btn" onclick="openTab('consulta')">📊 LISTADO</div>
    </div>

    <div id="mensaje" style="display:none; padding:10px; border-radius:5px; margin-bottom:10px;"></div>

    <!-- ══════════════ PESTAÑA REGISTRO ══════════════ -->
    <div id="registro" class="tab-content active">
        <form id="formInventario">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre de Equipo</label>
                    <input type="text" name="pc_nombre" placeholder="Ej: PC-VENTAS-01" required>
                </div>
                
                <div class="form-group">
                    <label>Número de Serie</label>
                    <input type="text" name="serie" placeholder="S/N: XXXXXXXX" required>
                </div>
                
                <div class="form-group">
                    <label>Ubicación</label>
                    <select name="piso" required>
                        <option value="" disabled selected>Seleccione el piso...</option>
                        <option value="Piso 1">Piso 1</option>
                        <option value="Piso 2">Piso 2</option>
                        <option value="Piso 3">Piso 3</option>
                        <option value="Piso 4">Piso 4</option>
                        <option value="Piso 5">Piso 5</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Área</label>
                    <input type="text" name="area" placeholder="Ej: Recursos Humanos" required>
                </div>
                
                <div class="form-group full-width">
                    <label>Usuario Responsable</label>
                    <input type="text" name="usuario" placeholder="Nombre del trabajador" required>
                </div>

                <div class="form-group full-width">
                    <label>Estado</label>
                    <select name="estado" required>
                        <option value="" disabled selected>Seleccione estado...</option>
                        <option value="ACTIVO">ACTIVO</option>
                        <option value="INACTIVO">INACTIVO</option>
                    </select>
                </div>
                
                <div class="form-group full-width">
                    <label>Notas Técnicas</label>
                    <textarea name="notas" rows="3" placeholder="RAM, Procesador, estado..."></textarea>
                </div>
            </div>
            
            <button type="submit" id="btnEnviar" class="full-width">💾 GUARDAR REGISTRO</button>
        </form>
    </div>

    <!-- ══════════════ PESTAÑA CONSULTA ══════════════ -->
    <div id="consulta" class="tab-content">
        <div class="header-tabla">
            <h3 style="margin: 0; color: white;">Equipos Registrados</h3>
            <button onclick="cargarDatos()" class="btn btn-success">🔄 ACTUALIZAR</button>
        </div>
        
        <div id="loader" style="display:none; color:white; margin-bottom:10px;">⏳ Sincronizando datos...</div>

        <div style="margin-bottom:10px; display:flex; gap:8px; flex-wrap:wrap;">
            <input type="text" id="filtroEquipo" placeholder="🖥️ Buscar por equipo" style="flex:1; min-width:150px;">
            <input type="text" id="filtroSerie" placeholder="🔍 Buscar por serie" style="flex:1; min-width:150px;">
            <input type="text" id="filtroUsuario" placeholder="👤 Buscar por usuario" style="flex:1; min-width:150px;">
            <select id="filtroPiso" style="flex:1; min-width:150px;">
    <option value="">🏢 Todos los pisos</option>
    <option value="Piso 1">Piso 1</option>
    <option value="Piso 2">Piso 2</option>
    <option value="Piso 3">Piso 3</option>
    <option value="Piso 4">Piso 4</option>
    <option value="Piso 5">Piso 5</option>
</select>
            <select id="filtroEstado" style="flex:1; min-width:120px;">
                <option value="">Todos los estados</option>
                <option value="ACTIVO">ACTIVO</option>
                <option value="INACTIVO">INACTIVO</option>
            </select>
        </div>

        <div class="tabla-container table-responsive">
            <table id="tablaInventario" class="table table-dark table-striped table-bordered">
                <thead>
                    <tr>
                        <th>ID ACTIVO</th>
                        <th>EQUIPO</th>
                        <th>SERIE</th>
                        <th>PISO</th>
                        <th>ÁREA</th>
                        <th>USUARIO</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ══════════════ MODAL EDITAR ══════════════ -->
<div id="modalEditar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:9999;">
    <div style="background:#2d3748; padding:25px; border-radius:10px; width:90%; max-width:500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h3 style="color:white; margin-top:0;">✏️ Editar Registro</h3>

        <input type="hidden" id="edit_id">

        <input type="text" id="edit_pc" placeholder="Nombre PC">
        <input type="text" id="edit_serie" placeholder="Serie">
        <select id="edit_piso">
            <option value="">Seleccione el piso...</option>
            <option value="Piso 1">Piso 1</option>
            <option value="Piso 2">Piso 2</option>
            <option value="Piso 3">Piso 3</option>
            <option value="Piso 4">Piso 4</option>
            <option value="Piso 5">Piso 5</option>
        </select>
        <input type="text" id="edit_area" placeholder="Área">
        <input type="text" id="edit_usuario" placeholder="Usuario">
        <select id="edit_estado">
            <option value="">Seleccione estado...</option>
            <option value="ACTIVO">ACTIVO</option>
            <option value="INACTIVO">INACTIVO</option>
        </select>
        <input type="text" id="edit_notas" placeholder="Notas">

        <div style="margin-top:15px;">
            <button id="btnGuardarEdit" onclick="guardarEdicion()" style="background:#4a86e8;">💾 Guardar</button>
            <button onclick="cerrarModal()" style="background:#e74c3c;">❌ Cancelar</button>
        </div>
    </div>
</div>

<!-- ══════════════ SCRIPTS ══════════════ -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycby_c5eCrb27fWb-sOdprSX3yeRqmGGUpI3xDUMhozzx-WMsJF2odm3adyUHstHVbATp/exec";

    /* ── PESTAÑAS ── */
    function openTab(tabId) {
        $('.tab-content').removeClass('active');
        $('.tab-btn').removeClass('active');
        $('#' + tabId).addClass('active');
        $('.tab-btn[onclick="openTab(\'' + tabId + '\')"]').addClass('active');
        if (tabId === 'consulta') cargarDatos();
    }

    /* ── MENSAJE GLOBAL ── */
    function mostrarMensaje(texto, tipo) {
        const div = document.getElementById("mensaje");
        div.style.display = "block";
        div.innerText = texto;
        div.style.background = tipo === "error" ? "#e74c3c" : "#2ecc71";
        setTimeout(() => { div.style.display = "none"; }, 3000);
    }

    /* ══════════════════════════════════════
       CREAR REGISTRO
    ══════════════════════════════════════ */
    document.getElementById('formInventario').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        data.action = "crear";   // siempre crear desde el formulario principal

        fetch(URL_APP_SCRIPT, {
            method: 'POST',
            body: JSON.stringify(data)   // Sin Content-Type: Apps Script acepta text/plain sin preflight CORS
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "error") {
                mostrarMensaje("❌ " + res.mensaje, "error");
                return;
            }
            if (res.status === "creado") {
                mostrarMensaje("✅ Guardado correctamente", "ok");
                this.reset();
            }
        })
        .catch(err => {
            console.error(err);
            mostrarMensaje("❌ Error de conexión", "error");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "💾 GUARDAR REGISTRO";
        });
    });

    /* ══════════════════════════════════════
       CARGAR DATOS + DATATABLES
    ══════════════════════════════════════ */
    let dataTable = null;

    async function cargarDatos() {
        $('#loader').show();
        try {
            const response = await fetch(URL_APP_SCRIPT + "?read=true");
            const data = await response.json();

            // Destruir instancia previa antes de reconstruir el tbody
            if (dataTable) {
                dataTable.destroy();
                dataTable = null;
            }

            const html = data.map(reg => `
                <tr>
                    <td><span style="color:#4a86e8;font-weight:bold;">${reg.id_activo || '-'}</span></td>
                    <td>${reg.nombre_de_pc || '-'}</td>
                    <td>${reg.serie || '-'}</td>
                    <td>${reg.piso || '-'}</td>
                    <td>${reg.area || '-'}</td>
                    <td>${reg.usuario || '-'}</td>
                    <td>${reg.estado || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick='editar(${JSON.stringify(reg)})'>✏️</button>
                        <button class="btn btn-sm btn-danger" onclick='eliminar(this, "${reg.id_activo}")'>🗑️</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('cuerpoTabla').innerHTML = html;

            dataTable = $('#tablaInventario').DataTable({
                scrollX: true,
                autoWidth: true,
                responsive: false,
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                pageLength: 10,
                dom: 'Btp',
                               buttons: [{
                    extend: 'excelHtml5',
                    text: '📥 Exportar Excel',
                    title: '',
                    exportOptions: {
                        columns: ':not(:last-child)' // ❌ excluye ACCIONES
                    }
                }]
            });

            /* ── Filtros: solo vincular tras crear DataTable ── */   // ✅ FIX: evita "dataTable is null"
            vincularFiltros();

        } catch (error) {
            console.error(error);
            mostrarMensaje("❌ Error al cargar datos", "error");
        } finally {
            $('#loader').hide();
        }
    }

/* Vincular filtros al DataTable activo (se llama cada vez que se reconstruye) */
function vincularFiltros() {
    $('#filtroEquipo').off('keyup').on('keyup', function() {
        dataTable.column(1).search(this.value).draw();
    });
    $('#filtroSerie').off('keyup').on('keyup', function() {
        dataTable.column(2).search(this.value).draw();
    });
    
    // --- FILTRO POR PISO (SELECT) ---
    // Usamos el índice 3 porque es la cuarta columna
    $('#filtroPiso').off('change').on('change', function() {
        dataTable.column(3).search(this.value).draw(); 
    });

    $('#filtroUsuario').off('keyup').on('keyup', function() {
        dataTable.column(5).search(this.value).draw();
    });
    $('#filtroEstado').off('change').on('change', function() {
        dataTable.column(6).search(this.value).draw();
    });
}

    /* ══════════════════════════════════════
       EDITAR
    ══════════════════════════════════════ */
    function editar(reg) {
        document.getElementById('modalEditar').style.display = "flex";
        document.getElementById('edit_id').value      = reg.id_activo;
        document.getElementById('edit_pc').value      = reg.nombre_de_pc;
        document.getElementById('edit_serie').value   = reg.serie;
        document.getElementById('edit_piso').value    = reg.piso;
        document.getElementById('edit_area').value    = reg.area;
        document.getElementById('edit_usuario').value = reg.usuario;
        document.getElementById('edit_estado').value  = reg.estado;
        document.getElementById('edit_notas').value   = reg.notas;
    }

    function guardarEdicion() {
        const btn = document.getElementById('btnGuardarEdit');
        btn.disabled = true;
        btn.innerHTML = 'Guardando <span class="spinner"></span>';

        const data = {
            action:    "editar",
            id:        document.getElementById('edit_id').value,
            pc_nombre: document.getElementById('edit_pc').value,
            serie:     document.getElementById('edit_serie').value,
            piso:      document.getElementById('edit_piso').value,
            area:      document.getElementById('edit_area').value,
            usuario:   document.getElementById('edit_usuario').value,
            estado:    document.getElementById('edit_estado').value,
            notas:     document.getElementById('edit_notas').value
        };

        fetch(URL_APP_SCRIPT, {
            method: 'POST',
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "error") {
                mostrarMensaje("❌ " + res.mensaje, "error");
                return;
            }
            if (res.status === "editado") {
                mostrarMensaje("✅ Registro actualizado", "ok");
                cerrarModal();
                cargarDatos();
            }
        })
        .catch(err => {
            console.error(err);
            mostrarMensaje("❌ Error en la petición", "error");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '💾 Guardar';
        });
    }

    function cerrarModal() {
        document.getElementById('modalEditar').style.display = "none";
    }

    /* ══════════════════════════════════════
       ELIMINAR
    ══════════════════════════════════════ */
    function eliminar(btn, id) {
        if (!confirm("¿Eliminar este registro?")) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        fetch(URL_APP_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "eliminar", id: id })
        })
        .then(() => {
            cargarDatos();
        })
        .catch(err => {
            console.error(err);
            btn.disabled = false;
            btn.innerHTML = '🗑️';
            mostrarMensaje("❌ Error al eliminar", "error");
        });
    }
</script>

</body>
</html>
