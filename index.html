
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario TI - Mobile Ready</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/light.css">
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
        }

        body { 
            max-width: 100%; 
            padding: 15px; 
            margin: 0;
        }

        h1 { text-align: center; color: var(--azul-institucional); }

        /* Pestañas con el azul anterior */
        .tabs { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 20px;
        }

        .tab-btn { 
            flex: 1;
            text-align: center;
            cursor: pointer; 
            padding: 12px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            background: #f0f0f0; 
            font-weight: bold;
        }

        .tab-btn.active { 
            background: var(--azul-institucional); 
            color: white; 
            border-color: var(--azul-institucional); 
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Formulario */
        input, select, textarea, button {
            width: 100% !important;
            margin: 8px 0 !important;
            box-sizing: border-box;
        }

        #btnEnviar {
            background-color: var(--azul-institucional);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1rem;
        }

        /* CONTENEDOR PARA SCROLL LATERAL */
        .tabla-container {
            width: 100%;
            overflow-x: auto; /* Esto permite el scroll de lado */
            margin-top: 15px;
            border: 1px solid #eee;
        }

        table {
            width: 100% !important;
            white-space: nowrap; /* Evita que el texto se amontone en varias líneas */
        }

        th {
            background-color: var(--azul-institucional) !important;
            color: white !important;
        }

        .loading { text-align: center; padding: 20px; color: var(--azul-institucional); }
    </style>
</head>
<body>

    <h1>Gestión de Inventario</h1>

    <div class="tabs">
        <div class="tab-btn active" onclick="openTab('registro')">REGISTRO</div>
        <div class="tab-btn" onclick="openTab('consulta')">LISTADO</div>
    </div>

    <div id="registro" class="tab-content active">
        <form id="formInventario">
            <input type="text" name="pc_nombre" placeholder="Nombre de PC" required>
            <input type="text" name="serie" placeholder="Número de Serie" required>
            <select name="piso" required>
                <option value="" disabled selected>Seleccione Piso</option>
                <option value="Piso 1">Piso 1</option>
                <option value="Piso 2">Piso 2</option>
                <option value="Piso 3">Piso 3</option>
            </select>
            <input type="text" name="area" placeholder="Área" required>
            <input type="text" name="usuario" placeholder="Usuario Responsable" required>
            <textarea name="notas" rows="3" placeholder="Notas..."></textarea>
            <button type="submit" id="btnEnviar">GUARDAR EN SHEETS</button>
        </form>
    </div>

    <div id="consulta" class="tab-content">
        <button onclick="cargarDatos()" style="background: #2ecc71; color: white;">ACTUALIZAR</button>
        <div id="loader" class="loading" style="display:none;">Cargando...</div>
        
        <div class="tabla-container">
            <table id="tablaInventario" class="display compact">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre PC</th>
                        <th>Serie</th>
                        <th>Piso</th>
                        <th>Área</th>
                        <th>Usuario</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

        function openTab(tabId) {
            $('.tab-content').removeClass('active');
            $('.tab-btn').removeClass('active');
            $(`#${tabId}`).addClass('active');
            $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
            if(tabId === 'consulta') cargarDatos();
        }

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("Guardado correctamente");
                this.reset();
                btn.disabled = false;
                btn.innerText = "GUARDAR EN SHEETS";
            }).catch(() => {
                alert("Error de conexión");
                btn.disabled = false;
            });
        });

        let dataTable;
        async function cargarDatos() {
            $('#loader').show();
            try {
                const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
                const data = await response.json();
                
                if (dataTable) dataTable.destroy();
                
                const html = data.map(reg => `
                    <tr>
                        <td>${reg.id_activo || '-'}</td>
                        <td>${reg.nombre_de_pc || '-'}</td>
                        <td>${reg.serie || '-'}</td>
                        <td>${reg.piso || '-'}</td>
                        <td>${reg.area || '-'}</td>
                        <td>${reg.usuario || '-'}</td>
                    </tr>
                `).join('');
                
                document.getElementById('cuerpoTabla').innerHTML = html;
                
                dataTable = $('#tablaInventario').DataTable({
                    scrollX: true, // Habilita el scroll interno de la librería
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                    pageLength: 10,
                    dom: 'tp' 
                });
            } catch (error) {
                console.error(error);
            } finally {
                $('#loader').hide();
            }
        }
    </script>
</body>
</html>
