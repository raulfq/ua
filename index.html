<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario TI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        body { max-width: 1000px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #4a86e8; padding-bottom: 10px; }
        .tab-btn { cursor: pointer; padding: 8px 16px; border-radius: 5px; border: 1px solid #ccc; background: #f0f0f0; color: #333; }
        .tab-btn.active { background: #4a86e8; color: white; border-color: #4a86e8; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        table { width: 100% !important; font-size: 0.9em; }
        .loading { text-align: center; padding: 20px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <h1>Gestión de Inventario TI</h1>

    <div class="tabs">
        <div class="tab-btn active" onclick="openTab('registro')">Registrar Activo</div>
        <div class="tab-btn" onclick="openTab('consulta')">Consultar Inventario</div>
    </div>

    <div id="registro" class="tab-content active">
        <h2>Nuevo Registro</h2>
        <form id="formInventario">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" name="pc_nombre" placeholder="Nombre de PC" required>
                <input type="text" name="serie" placeholder="Número de Serie" required>
                <select name="piso">
                    <option value="" disabled selected>Seleccione Piso</option>
                    <option value="Piso 1">Piso 1</option>
                    <option value="Piso 2">Piso 2</option>
                    <option value="Piso 3">Piso 3</option>
                </select>
                <input type="text" name="area" placeholder="Área (Ej: Contabilidad)" required>
                <input type="text" name="usuario" placeholder="Usuario Responsable" required>
            </div>
            <textarea name="notas" placeholder="Notas adicionales o especificaciones técnicas"></textarea>
            <button type="submit" id="btnEnviar">Guardar en Google Sheets</button>
        </form>
    </div>

    <div id="consulta" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Inventario Actual</h2>
            <button onclick="cargarDatos()" style="background: #2ecc71;">Actualizar Tabla</button>
        </div>
        <div id="loader" class="loading" style="display:none;">Obteniendo datos desde la nube...</div>
        <table id="tablaInventario" class="display">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre PC</th>
                    <th>Serie</th>
                    <th>Piso</th>
                    <th>Área</th>
                    <th>Usuario</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <script>
    // 1. Asegúrate de que esta URL sea la de tu última implementación (Nueva versión)
    const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

    // Lógica de Pestañas
    function openTab(tabId) {
        $('.tab-content').removeClass('active');
        $('.tab-btn').removeClass('active');
        $(`#${tabId}`).addClass('active');
        $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
        
        // Cargar datos automáticamente al entrar a la pestaña de consulta
        if(tabId === 'consulta') cargarDatos();
    }

    // Envío de Datos (POST)
    document.getElementById('formInventario').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        const formData = new FormData(this);
        const data = Object.fromEntries(formData);

        fetch(URL_APP_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Importante para Google Apps Script
            body: JSON.stringify(data)
        }).then(() => {
            alert("¡Activo registrado con éxito!");
            this.reset();
            btn.disabled = false;
            btn.innerText = "Guardar en Google Sheets";
        }).catch(err => {
            console.error("Error al guardar:", err);
            alert("Error al enviar los datos.");
            btn.disabled = false;
        });
    });

    // Carga de Datos (GET) - AQUÍ ESTABA EL ERROR CORREGIDO
    let dataTable;
    async function cargarDatos() {
        $('#loader').show();
        try {
            // Usamos la variable URL_APP_SCRIPT correctamente
            const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
            const data = await response.json();
            
            if (dataTable) dataTable.destroy();
            
            const html = data.map(reg => `
                <tr>
                    <td>${reg.id_activo || '-'}</td>
                    <td>${reg.nombre_de_pc || '-'}</td>
                    <td>${reg.serie || '-'}</td>
                    <td>${reg.piso || '-'}</td>
                    <td>${reg.area || '-'}</td>
                    <td>${reg.usuario || '-'}</td>
                </tr>
            `).join('');
            
            document.getElementById('cuerpoTabla').innerHTML = html;
            
            // Reiniciar DataTables
            dataTable = $('#tablaInventario').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                pageLength: 10,
                responsive: true
            });
        } catch (error) {
            console.error("Error cargando tabla:", error);
            document.getElementById('cuerpoTabla').innerHTML = "<tr><td colspan='6'>Error al cargar datos. Revisa la consola.</td></tr>";
        } finally {
            $('#loader').hide();
        }
    }
</script>
</body>
</html>
