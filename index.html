<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario TI - Dark Mode</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
        }

        body { 
            max-width: 100%; 
            padding: 15px; 
            margin: 0;
            background-color: #202b38; /* Color de fondo oscuro sólido */
        }

        h1 { text-align: center; color: var(--azul-institucional); margin-bottom: 20px; }

        /* Pestañas */
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 25px;
        }

        .tab-btn { 
            flex: 1;
            text-align: center;
            cursor: pointer; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2d3748; 
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active { 
            background: var(--azul-institucional); 
            border-color: var(--azul-institucional); 
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Mejoras en el Formulario */
        input, select, textarea {
            background: #2d3748 !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 12px !important;
        }

        #btnEnviar {
            background-color: var(--azul-institucional);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        /* MEJORAS EN LA LISTA (ESPACIADO) */
        .tabla-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
            background: #2d3748;
            border-radius: 8px;
            padding: 10px; /* Espacio interno del contenedor */
            box-sizing: border-box;
        }

        table.dataTable {
            border-collapse: collapse !important;
            margin: 10px 0 !important;
        }

        /* Espaciado de las celdas (Padding) */
        table.dataTable tbody td, 
        table.dataTable thead th {
            padding: 15px 12px !important; /* Más espacio para que no esté pegado */
            border-bottom: 1px solid #444;
        }

        table.dataTable thead th {
            background-color: var(--azul-institucional) !important;
            color: white !important;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Estilo para los textos dentro de la tabla */
        table.dataTable tbody tr {
            background-color: #2d3748 !important;
            color: #e2e8f0;
        }

        /* Buscador de DataTables en modo oscuro */
        .dataTables_filter input {
            margin-left: 10px !important;
            display: inline-block !important;
            width: auto !important;
        }

        .loading { text-align: center; padding: 20px; color: var(--azul-institucional); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Gestión de Inventario</h1>

    <div class="tabs">
        <div class="tab-btn active" onclick="openTab('registro')">REGISTRO</div>
        <div class="tab-btn" onclick="openTab('consulta')">LISTADO</div>
    </div>

    <div id="registro" class="tab-content active">
        <form id="formInventario">
            <label>Equipo</label>
            <input type="text" name="pc_nombre" placeholder="Nombre de PC" required>
            
            <label>Serie</label>
            <input type="text" name="serie" placeholder="Número de Serie" required>
            
            <label>Ubicación</label>
            <select name="piso" required>
                <option value="" disabled selected>Seleccione Piso</option>
                <option value="Piso 1">Piso 1</option>
                <option value="Piso 2">Piso 2</option>
                <option value="Piso 3">Piso 3</option>
            </select>
            
            <label>Área / Usuario</label>
            <input type="text" name="area" placeholder="Área" required>
            <input type="text" name="usuario" placeholder="Usuario Responsable" required>
            
            <label>Notas</label>
            <textarea name="notes" rows="3" placeholder="Notas..."></textarea>
            
            <button type="submit" id="btnEnviar">GUARDAR EN SHEETS</button>
        </form>
    </div>

    <div id="consulta" class="tab-content">
        <button onclick="cargarDatos()" style="background: #2ecc71; color: white; width: auto !important; padding: 10px 20px;">ACTUALIZAR DATOS</button>
        
        <div id="loader" class="loading" style="display:none;">⏳ Accediendo a la base de datos...</div>
        
        <div class="tabla-container">
            <table id="tablaInventario" class="display nowrap cell-border">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre PC</th>
                        <th>Serie</th>
                        <th>Piso</th>
                        <th>Área</th>
                        <th>Usuario</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

        function openTab(tabId) {
            $('.tab-content').removeClass('active');
            $('.tab-btn').removeClass('active');
            $(`#${tabId}`).addClass('active');
            $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
            if(tabId === 'consulta') cargarDatos();
        }

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("✅ Guardado correctamente en la nube");
                this.reset();
                btn.disabled = false;
                btn.innerText = "GUARDAR EN SHEETS";
            }).catch(() => {
                alert("❌ Error de conexión");
                btn.disabled = false;
            });
        });

        let dataTable;
        async function cargarDatos() {
            $('#loader').show();
            try {
                const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
                const data = await response.json();
                
                if (dataTable) dataTable.destroy();
                
                const html = data.map(reg => `
                    <tr>
                        <td><b>${reg.id_activo || '-'}</b></td>
                        <td>${reg.nombre_de_pc || '-'}</td>
                        <td>${reg.serie || '-'}</td>
                        <td>${reg.piso || '-'}</td>
                        <td>${reg.area || '-'}</td>
                        <td>${reg.usuario || '-'}</td>
                    </tr>
                `).join('');
                
                document.getElementById('cuerpoTabla').innerHTML = html;
                
                dataTable = $('#tablaInventario').DataTable({
                    scrollX: true,
                    language: { 
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json',
                        searchPlaceholder: "Buscar activo..."
                    },
                    pageLength: 10,
                    dom: 'ftp' // Filtro, Tabla, Paginación
                });
            } catch (error) {
                console.error(error);
                alert("Error al obtener los datos");
            } finally {
                $('#loader').hide();
            }
        }
    </script>
</body>
</html>
