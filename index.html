<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
      form { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      label { display: block; margin-top: 10px; font-weight: bold; color: #333; }
      input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
      button { margin-top: 20px; width: 100%; padding: 10px; background-color: #4a86e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background-color: #357abd; }
      #mensaje { margin-top: 15px; color: green; font-weight: bold; text-align: center; }
    </style>
  </head>
  <body>
    <h2>Registro de Inventario TI</h2>
    <form id="miFormulario">
      <label>Nombre de PC:</label>
      <input type="text" name="pc_nombre" required>
      
      <label>Serie:</label>
      <input type="text" name="serie" required>
      
      <label>Piso:</label>
      <select name="piso">
        <option value="Piso 1">Piso 1</option>
        <option value="Piso 2">Piso 2</option>
        <option value="Piso 3">Piso 3</option>
      </select>
      
      <label>Área:</label>
      <input type="text" name="area" required>
      
      <label>Usuario:</label>
      <input type="text" name="usuario" required>
      
      <label>Notas:</label>
      <textarea name="notas" rows="3"></textarea>
      
      <button type="button" onclick="enviarDatos(this)">Registrar Activo</button>
    </form>
    
    <div id="mensaje"></div>

    <script>
      function enviarDatos(boton) {
        boton.disabled = true;
        boton.innerText = "Enviando...";
        var form = document.getElementById('miFormulario');
        
        google.script.run
          .withSuccessHandler(function(res) {
            document.getElementById('mensaje').innerHTML = res;
            form.reset();
            boton.disabled = false;
            boton.innerText = "Registrar Activo";
          })
          .procesarFormulario(form);
      }
    </script>
  </body>
</html>
