<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario TI - Full Width</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
        }

        /* AJUSTE CLAVE: Permitir que el cuerpo use todo el ancho en escritorio */
        body { 
            max-width: 100% !important; 
            width: 100% !important;
            padding: 20px; 
            margin: 0 auto;
            background-color: #202b38;
            box-sizing: border-box;
        }

        /* Contenedor principal centrado pero expandible */
        .main-container {
            max-width: 1200px; /* Ancho máximo para que no se vea infinito en monitores 4K */
            margin: 0 auto;
        }

        h1 { text-align: center; color: var(--azul-institucional); margin-bottom: 30px; }

        /* Pestañas */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px;
            justify-content: center;
        }

        .tab-btn { 
            flex: 1;
            max-width: 300px;
            text-align: center;
            cursor: pointer; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2d3748; 
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active { 
            background: var(--azul-institucional); 
            border-color: var(--azul-institucional); 
            box-shadow: 0 4px 15px rgba(74, 134, 232, 0.3);
        }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* Formulario centrado */
        #formInventario {
            max-width: 600px;
            margin: 0 auto;
            background: #2d3748;
            padding: 25px;
            border-radius: 10px;
        }

        /* TABLA MEJORADA */
        .tabla-container {
            width: 100%;
            overflow-x: auto;
            background: #2d3748;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        table.dataTable {
            width: 100% !important;
            margin: 0 !important;
        }

        table.dataTable thead th {
            background-color: var(--azul-institucional) !important;
            padding: 15px !important;
            border-bottom: none !important;
        }

        table.dataTable tbody td {
            padding: 12px 15px !important;
            border-bottom: 1px solid #3e4b5b !important;
        }

        /* Estilo para el buscador de la tabla */
        .dataTables_filter {
            margin-bottom: 15px !important;
        }

        .dataTables_filter input {
            background: #1a202c !important;
            border: 1px solid #444 !important;
            border-radius: 5px;
            padding: 8px !important;
            width: 250px !important;
        }

        .loading { text-align: center; padding: 20px; color: var(--azul-institucional); font-weight: bold; }

        /* Responsividad para móviles */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .tab-btn { padding: 10px; font-size: 0.8rem; }
            #formInventario { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Gestión de Inventario TI</h1>

        <div class="tabs">
            <div class="tab-btn active" onclick="openTab('registro')">📝 REGISTRO</div>
            <div class="tab-btn" onclick="openTab('consulta')">📊 LISTADO COMPLETO</div>
        </div>

        <div id="registro" class="tab-content active">
            <form id="formInventario">
                <label>Nombre de Equipo</label>
                <input type="text" name="pc_nombre" placeholder="Ej: PC-VENTAS-01" required>
                
                <label>Número de Serie</label>
                <input type="text" name="serie" placeholder="S/N: XXXXXXXX" required>
                
                <label>Ubicación</label>
                <select name="piso" required>
                    <option value="" disabled selected>Seleccione el piso...</option>
                    <option value="Piso 1">Piso 1</option>
                    <option value="Piso 2">Piso 2</option>
                    <option value="Piso 3">Piso 3</option>
                </select>
                
                <label>Área</label>
                <input type="text" name="area" placeholder="Ej: Recursos Humanos" required>
                
                <label>Usuario Responsable</label>
                <input type="text" name="usuario" placeholder="Nombre del trabajador" required>
                
                <label>Notas Técnicas</label>
                <textarea name="notas" rows="3" placeholder="RAM, Procesador, estado..."></textarea>
                
                <button type="submit" id="btnEnviar" style="background: var(--azul-institucional); color: white; cursor: pointer;">💾 GUARDAR REGISTRO</button>
            </form>
        </div>

        <div id="consulta" class="tab-content">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button onclick="cargarDatos()" style="background: #2ecc71; color: white; border: none; width: auto; padding: 10px 20px; cursor: pointer;">🔄 ACTUALIZAR TABLA</button>
            </div>
            
            <div id="loader" class="loading" style="display:none;">⏳ Sincronizando con Google Sheets...</div>
            
            <div class="tabla-container">
                <table id="tablaInventario" class="display nowrap">
                    <thead>
                        <tr>
                            <th>ID ACTIVO</th>
                            <th>NOMBRE PC</th>
                            <th>SERIE</th>
                            <th>PISO</th>
                            <th>ÁREA</th>
                            <th>USUARIO</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

        function openTab(tabId) {
            $('.tab-content').removeClass('active');
            $('.tab-btn').removeClass('active');
            $(`#${tabId}`).addClass('active');
            $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
            if(tabId === 'consulta') cargarDatos();
        }

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO DATOS...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("✅ Éxito: El equipo ha sido registrado.");
                this.reset();
                btn.disabled = false;
                btn.innerText = "💾 GUARDAR REGISTRO";
            }).catch(err => {
                console.error(err);
                alert("❌ Error al guardar.");
                btn.disabled = false;
            });
        });

        let dataTable;
        async function cargarDatos() {
            $('#loader').show();
            try {
                const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
                const data = await response.json();
                
                if (dataTable) dataTable.destroy();
                
                const html = data.map(reg => `
                    <tr>
                        <td><span style="color: #4a86e8; font-weight: bold;">${reg.id_activo || '-'}</span></td>
                        <td>${reg.nombre_de_pc || '-'}</td>
                        <td>${reg.serie || '-'}</td>
                        <td>${reg.piso || '-'}</td>
                        <td>${reg.area || '-'}</td>
                        <td>${reg.usuario || '-'}</td>
                    </tr>
                `).join('');
                
                document.getElementById('cuerpoTabla').innerHTML = html;
                
                dataTable = $('#tablaInventario').DataTable({
                    scrollX: true,
                    language: { 
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
                    },
                    pageLength: 10,
                    dom: 'ftp'
                });
            } catch (error) {
                console.error(error);
            } finally {
                $('#loader').hide();
            }
        }
    </script>
</body>
</html>
