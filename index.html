
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario TI - Columnas Espaciadas</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    
    <style>
        :root {
            --azul-institucional: #4a86e8;
            --fondo-oscuro: #202b38;
            --fondo-paneles: #2d3748;
        }

        body { 
            max-width: 100% !important; 
            width: 100% !important;
            padding: 20px; 
            margin: 0 auto;
            background-color: var(--fondo-oscuro);
        }

        .main-container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: var(--azul-institucional); margin-bottom: 25px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { 
            flex: 1; max-width: 300px; text-align: center; cursor: pointer; 
            padding: 14px; border-radius: 8px; border: 1px solid #444; 
            background: var(--fondo-paneles); color: #fff; font-weight: bold;
        }
        .tab-btn.active { background: var(--azul-institucional); border-color: var(--azul-institucional); }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        #formInventario {
            max-width: 800px; margin: 0 auto; background: var(--fondo-paneles);
            padding: 30px; border-radius: 10px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: span 2; }
        }
        
        input, select, textarea {
            background: #1a202c !important; border: 1px solid #444 !important;
            color: white !important; padding: 12px !important;
        }

        #btnEnviar {
            background-color: var(--azul-institucional); color: white; border: none;
            padding: 16px; font-size: 1.1rem; font-weight: bold; width: 100%; border-radius: 8px;
        }

        /* --- AJUSTE DE ESPACIADO ENTRE COLUMNAS --- */
        .tabla-container {
            width: 100%; background: var(--fondo-paneles); border-radius: 10px;
            padding: 20px; box-sizing: border-box;
        }

        table.dataTable { 
            width: 100% !important; 
            border-collapse: separate !important; 
            border-spacing: 0;
        }
        
        /* Aumentamos el padding lateral (25px) para separar las columnas */
        table.dataTable thead th { 
            background-color: var(--azul-institucional) !important; 
            padding: 18px 25px !important; /* Arriba/Abajo 18px, Lados 25px */
            color: white !important; 
            text-align: left;
        }
        
        table.dataTable tbody td { 
            padding: 18px 25px !important; /* Arriba/Abajo 18px, Lados 25px */
            border-bottom: 1px solid #3e4b5b !important; 
            white-space: nowrap; /* Mantiene el contenido en una línea para forzar el espacio */
        }

        /* Ajuste del buscador */
        .dataTables_filter { margin-bottom: 20px !important; }
        .dataTables_filter input { width: 250px !important; background: #1a202c !important; }

        .loading { text-align: center; padding: 20px; color: var(--azul-institucional); font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Inventario TI</h1>

        <div class="tabs">
            <div class="tab-btn active" onclick="openTab('registro')">📝 REGISTRO</div>
            <div class="tab-btn" onclick="openTab('consulta')">📊 LISTADO</div>
        </div>

        <div id="registro" class="tab-content active">
            <form id="formInventario">
                <div class="form-grid">
                    <input type="text" name="pc_nombre" placeholder="Nombre de Equipo" required>
                    <input type="text" name="serie" placeholder="Número de Serie" required>
                    <select name="piso" required>
                        <option value="" disabled selected>Piso...</option>
                        <option value="Piso 1">Piso 1</option>
                        <option value="Piso 2">Piso 2</option>
                        <option value="Piso 3">Piso 3</option>
                        <option value="Piso 3">Piso 4</option>
                        <option value="Piso 3">Piso 5</option>
                    </select>
                    
                    <input type="text" name="area" placeholder="Área" required>
                    <input type="text" name="usuario" placeholder="Usuario" class="full-width" required>
                    <textarea name="notas" rows="2" placeholder="Notas..." class="full-width"></textarea>
                </div>
                <button type="submit" id="btnEnviar">💾 GUARDAR REGISTRO</button>
            </form>
        </div>

        <div id="consulta" class="tab-content">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button onclick="cargarDatos()" style="background: #2ecc71; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">🔄 ACTUALIZAR</button>
            </div>
            
            <div id="loader" class="loading" style="display:none;">⏳ Cargando datos...</div>
            
            <div class="tabla-container">
                <table id="tablaInventario" class="display cell-border" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>EQUIPO</th>
                            <th>SERIE</th>
                            <th>PISO</th>
                            <th>ÁREA</th>
                            <th>USUARIO</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script>
        const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbzytWxR87UCFm2VpDUP5GhvqK4jj-4EXs_Hei6r--NTmy3ylmY1XSsrq6_7KgqJRy7-/exec"; 

        function openTab(tabId) {
            $('.tab-content').removeClass('active');
            $('.tab-btn').removeClass('active');
            $(`#${tabId}`).addClass('active');
            $(`.tab-btn[onclick="openTab('${tabId}')"]`).addClass('active');
            if(tabId === 'consulta') cargarDatos();
        }

        document.getElementById('formInventario').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            fetch(URL_APP_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(Object.fromEntries(new FormData(this)))
            }).then(() => {
                alert("✅ Guardado correctamente.");
                this.reset();
                btn.disabled = false;
                btn.innerText = "💾 GUARDAR REGISTRO";
            });
        });

        let dataTable;
        async function cargarDatos() {
            $('#loader').show();
            try {
                const response = await fetch(`${URL_APP_SCRIPT}?read=true`);
                const data = await response.json();
                if (dataTable) dataTable.destroy();
                
                const html = data.map(reg => `
                    <tr>
                        <td><span style="color: #4a86e8; font-weight: bold;">${reg.id_activo || '-'}</span></td>
                        <td>${reg.nombre_de_pc || '-'}</td>
                        <td>${reg.serie || '-'}</td>
                        <td>${reg.piso || '-'}</td>
                        <td>${reg.area || '-'}</td>
                        <td>${reg.usuario || '-'}</td>
                    </tr>
                `).join('');
                
                document.getElementById('cuerpoTabla').innerHTML = html;
                
                dataTable = $('#tablaInventario').DataTable({
                    responsive: true,
                    scrollX: true, // Importante para mantener el espacio si la tabla crece mucho
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                    pageLength: 10,
                    dom: 'ftp'
                });
            } catch (error) {
                console.error(error);
            } finally {
                $('#loader').hide();
            }
        }
    </script>
</body>
</html>
